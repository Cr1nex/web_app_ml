services:
  db:
    image: postgres:15-alpine
    container_name: hw2-db
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: hw2-redis
    networks:
      - app-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: hw2-rabbitmq
    ports:
      - "15672:15672"
    networks:
      - app-net

  app:
    build:
      context: ./backend
    container_name: hw2-backend
    # Run migrations then start the server — no manual exec needed
    command: >
      sh -c "alembic upgrade head && uvicorn api.app:app --host 0.0.0.0 --port 8000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppassword
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_KEY_ID: backend-1
      ML_SERVICE_URL: http://ml-service:5002
    depends_on:
      db:
        condition: service_healthy   # waits for pg_isready, not just container start
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - app-net

  mlflow:
    build:
      context: ./ml_service
      dockerfile: src/deployment/Dockerfile
    container_name: hw2-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/app/mlflow
      - mlflow-artifacts:/app/artifacts
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  ml-service:
    build:
      context: ./ml_service
    container_name: hw2-ml-service
    ports:
      - "5002:5002"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      ML_AUTH_REDIS_URL: redis://redis:6379/0
      ML_AUTH_JWT_ISSUER: backend
      ML_AUTH_JWT_AUDIENCE: backend-users
      ML_AUTH_JWT_REDIS_PREFIX: jwt:keys
      ML_AUTH_ENABLE_AUTH: "true"
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-net
    restart: on-failure

  frontend:
    build:
      context: ./frontend
    container_name: hw2-frontend
    networks:
      - app-net
    depends_on:
      - app

  gateway:
    image: nginx:1.27-alpine
    container_name: hw2-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend
    networks:
      - app-net

volumes:
  db-data:
  mlflow-data:
  mlflow-artifacts:

networks:
  app-net:
    name: hw2-app-net
    driver: bridge
