apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hw2
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: migrate
          image: hw2/backend:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: appdb
            - name: DB_USER
              value: appuser
            - name: DB_PASSWORD
              value: apppassword
      containers:
        - name: backend
          image: hw2/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: appdb
            - name: DB_USER
              value: appuser
            - name: DB_PASSWORD
              value: apppassword
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
            - name: JWT_ISSUER
              value: backend
            - name: JWT_AUDIENCE
              value: backend-users
            - name: JWT_KEY_ID
              value: backend-1
            - name: JWT_KEY_ROTATION_DAYS
              value: "30"
            - name: JWT_RETIRED_PUBLIC_KEY_TTL_DAYS
              value: "45"
            - name: JWT_REDIS_PREFIX
              value: jwt:keys
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: hw2
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
