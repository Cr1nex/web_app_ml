apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-gateway-config
  namespace: hw2
data:
  default.conf: |
    limit_req_zone $binary_remote_addr zone=login:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=register:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=refresh:10m  rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api:10m      rate=120r/m;

    upstream frontend_upstream {
      server frontend.hw2.svc.cluster.local:80;
    }

    upstream backend_upstream {
      server backend.hw2.svc.cluster.local:8000;
    }

    server {
      listen 80;
      server_name _;

      limit_req_status 429;

      location = /api/v1/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location = /api/v1/auth/register {
        limit_req zone=register burst=2 nodelay;
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location = /api/v1/auth/refresh {
        limit_req zone=refresh burst=10 nodelay;
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location = /health {
        proxy_pass http://backend_upstream/health;
      }

      location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
  namespace: hw2
  labels:
    app: nginx-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
  namespace: hw2
spec:
  type: NodePort
  selector:
    app: nginx-gateway
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30501
