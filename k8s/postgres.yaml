apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: webml
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# Mounted into /docker-entrypoint-initdb.d/ — Postgres runs the script
# exactly once, when the data volume is first initialised. It creates the
# `mlflow` database alongside `appdb` so the MLflow tracking server has a
# place to keep run metadata. Idempotent (uses pg_database guard) so a
# stale re-run is safe.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  namespace: webml
data:
  01-create-mlflow-db.sh: |
    #!/bin/sh
    set -eu
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<'EOSQL'
    SELECT 'CREATE DATABASE mlflow OWNER appuser'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'mlflow')
    \gexec
    EOSQL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: webml
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: appdb
            - name: POSTGRES_USER
              value: appuser
            - name: POSTGRES_PASSWORD
              value: apppassword
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: postgres-initdb
          configMap:
            name: postgres-initdb
            defaultMode: 0o755
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: webml
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: 5432
