# Rate-limit zones — keyed by real client IP
# Stored in 10 MB shared memory (holds ~160k IPs each)
limit_req_zone $binary_remote_addr zone=login:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=register:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=refresh:10m  rate=30r/m;
limit_req_zone $binary_remote_addr zone=api:10m      rate=120r/m;

upstream backend_upstream {
  server app:8000;
}

upstream frontend_upstream {
  server frontend:80;
}

server {
  listen 80;
  server_name _;

  # Return 429 Too Many Requests (not default 503) when a zone is exhausted
  limit_req_status 429;

  # --- Auth endpoints with tight per-endpoint limits ---

  location = /api/v1/auth/login {
    limit_req zone=login burst=5 nodelay;
    proxy_pass         http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  location = /api/v1/auth/register {
    limit_req zone=register burst=2 nodelay;
    proxy_pass         http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  location = /api/v1/auth/refresh {
    limit_req zone=refresh burst=10 nodelay;
    proxy_pass         http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # --- General API (JWKS, docs, everything else) ---

  location /api/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass         http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass http://backend_upstream/health;
  }

  location / {
    proxy_pass         http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }
}
