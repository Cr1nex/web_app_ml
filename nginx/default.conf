# Rate-limit zones — keyed by real client IP
# Stored in 10 MB shared memory (holds ~160k IPs each)
limit_req_zone $binary_remote_addr zone=login:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=register:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=refresh:10m  rate=30r/m;
limit_req_zone $binary_remote_addr zone=api:10m      rate=120r/m;

# Docker's embedded DNS lives at 127.0.0.11. `valid=10s` re-resolves every
# 10 seconds, so when `app` or `frontend` is recreated and gets a new IP
# we pick it up automatically instead of caching the dead address forever.
# `ipv6=off` avoids spurious AAAA lookups on an IPv4-only docker network.
resolver 127.0.0.11 valid=10s ipv6=off;

# Proxy header set — declared once so every location stays identical.
proxy_http_version 1.1;
proxy_set_header   Host              $host;
proxy_set_header   X-Real-IP         $remote_addr;
proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto $scheme;

server {
  listen 80;
  server_name _;

  # Return 429 Too Many Requests (not default 503) when a zone is exhausted
  limit_req_status 429;

  # `set $var ...; proxy_pass http://$var;` forces nginx to use the runtime
  # resolver above on every request, instead of doing a one-shot lookup at
  # startup like `upstream { server app:8000; }` would.
  set $backend  "app:8000";
  set $frontend "frontend:80";

  # --- Auth endpoints with tight per-endpoint limits ---

  location = /api/v1/auth/login {
    limit_req zone=login burst=5 nodelay;
    proxy_pass http://$backend;
  }

  location = /api/v1/auth/register {
    limit_req zone=register burst=2 nodelay;
    proxy_pass http://$backend;
  }

  location = /api/v1/auth/refresh {
    limit_req zone=refresh burst=10 nodelay;
    proxy_pass http://$backend;
  }

  # --- General API (JWKS, docs, predictions, everything else) ---

  location /api/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://$backend;
  }

  location = /health {
    proxy_pass http://$backend/health;
  }

  location / {
    proxy_pass http://$frontend;
  }
}
